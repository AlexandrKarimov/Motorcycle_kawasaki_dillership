<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Восстановление пароля | Kawasaki Dealership</title>
    <link rel="stylesheet" href="/Motorcycle_kawasaki_dillership/flask_app/static/css/forgotpassword.css">
</head>
<body>
    <main>
        <div class="circle"></div>
        <div class="forgot-form-container">
            <h1 class="form-title">Forgot password?</h1>
            <p class="form-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
            
            <div id="alertContainer" class="alert-message" style="display: none;"></div>
            
            <form id="forgotForm" method="POST" action="/forgot-password">
                <div class="form-fields">
                    <div class="form-field">
                        <input type="email" name="email" id="email" placeholder="Email address" required autocomplete="email">
                    </div>
                </div>
                <div class="form_buttons">
                    <button type="submit" class="button">Send reset link</button>
                </div>
            </form>
            
            <div class="back-link">
                <p>Remember your password? <a href="/Motorcycle_kawasaki_dillership/flask_app/templates/login.html">Back to Log in</a></p>
            </div>
        </div>
    </main>
    <script src="/Motorcycle_kawasaki_dillership/flask_app/js/main.js"></script>
    <script src="/Motorcycle_kawasaki_dillership/flask_app/js/theme-switcher.js"></script>
</body>
</html>
